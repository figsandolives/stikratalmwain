<!doctype html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#12352f" />
  <title>Sticker Printer</title>
  <link rel="manifest" href="label-manifest.json" />
  <link rel="stylesheet" href="label-app.css" />
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
</head>
<body>
  <main id="labelApp" class="app-shell">
    <section class="splash" aria-live="polite">
      <div class="printer-mark" aria-hidden="true">
        <span class="printer-top"></span>
        <span class="printer-body"></span>
        <span class="printer-label"></span>
      </div>
      <h1>Sticker Printer</h1>
      <p>Loading product labels...</p>
    </section>
  </main>
  <script src="label-app.js"></script>
</body>
</html>
